<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VB AI - शेर का AI</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;text-align:center}
h1{text-shadow:0 0 15px #0f0;font-size:28px}
#box{border:2px solid #0f0;padding:25px;border-radius:15px;margin-top:30px}
input{width:70%;padding:12px;background:#111;color:#0f0;border:2px solid #0f0;border-radius:8px}
button{width:25%;padding:12px;background:#0f0;color:#000;border:none;border-radius:8px;font-weight:bold}
#reply{margin-top:25px;font-size:20px;color:#0ff}
</style>
</head>
<body>
<h1>🤖 VB AI - V.B. Style</h1>
<div id="box">
<input type="text" id="msg" placeholder="शेर से पूछो...">
<button onclick="reply()">पूछो</button>
<div id="reply">शेर, नमस्ते बोल...</div>
</div>
<script>
function reply(){
let m=document.getElementById('msg').value.toLowerCase();
let r="";
if(m.includes('v.b')) r="V.B. बोलते हैं: शेर कभी हार नहीं मानता 🔥";
else if(m.includes('कलाम')) r="कलाम सर: सपने वो नहीं जो सोते समय आते हैं...";
else if(m.includes('शेर')) r="शेर मैदान में उतरा है 🇮🇳";
else r="शेर बोल: साफ पूछ भाई, जवाब दूंगा";
document.getElementById('reply').innerText=r;
}
</script>
</body>
</html>
